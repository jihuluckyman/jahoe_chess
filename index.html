<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자회체스 - 온라인 멀티플레이어 체스</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♟</text></svg>">
    
    <meta property="og:type" content="website" />
    <meta property="og:title" content="자회체스 - 온라인 멀티플레이어 체스" />
    <meta property="og:image" content="https://screenshot-taker-prod.weichiang.workers.dev/message/019ebba3-43d0-7046-819b-c8f32b71e2ea/og-image.webp" />

    <style>
      /* 여백을 완전히 없애고 화면에 꽉 차게 만듭니다 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        overflow: hidden;
        background: #f5f5f5;
      }

      /* 게임을 담는 그릇을 화면 전체 크기로 설정 */
      .iframe-container {
        width: 100%;
        height: 100%;
        position: relative;
      }

      iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>

    <div class="iframe-container">
      <iframe
        id="preview-iframe"
        src="https://019ebba3-43d0-7046-819b-c8f32b71e2ea.arena.site/?embed=true"
        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation"
        allow="
          accelerometer;
          autoplay;
          camera;
          encrypted-media;
          fullscreen;
          geolocation;
          gyroscope;
          microphone;
          midi;
          clipboard-read;
          clipboard-write;
          usb;
          vr;
          xr-spatial-tracking;
          screen-wake-lock;
          magnetometer;
          ambient-light-sensor;
          battery;
          gamepad;
          picture-in-picture;
          display-capture;
          bluetooth;
        "
        referrerpolicy="origin-when-cross-origin"
      ></iframe>
    </div>

    <script>
      // 페이지가 로드되면 체스 게임 창에 자동으로 포커스를 맞춰 키보드 조작이 잘 되게 합니다
      const iframe = document.getElementById("preview-iframe");
      iframe.addEventListener("load", () => iframe.focus());
    </script>
  </body>
</html>
